name: uzza_max
description: Uzza Max Streaming App

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  get: ^4.7.3

  # Network
  dio: ^5.9.2

  # UI
  flutter_screenutil: ^5.9.3
  skeletonizer: ^2.1.3
  video_player: ^2.11.1
  flutter_chrome_cast: ^1.4.1
  android_intent_plus: ^6.0.0
  device_info_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.4

flutter_icons:
    android: true
    ios: true
    image_path: "assets/images/app_icon_logo.png"
    adaptive_icon_background: "#003041"
    adaptive_icon_foreground: "assets/images/app_splash_logo.png"

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/videos/

  fonts:
    - family: Questrial
      fonts:
        - asset: assets/fonts/Questrial-Regular.ttf